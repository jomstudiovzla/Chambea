name: Chambea
options:
  bundleIdPrefix: com.chambea
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: es
  knownRegions:
    - es
    - en
    - pt
settings:
  SWIFT_VERSION: "5.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  Chambea:
    type: application
    platform: iOS
    sources:
      - path: Chambea
        excludes:
          - Resources/Info.plist
    resources:
      - Chambea/Resources/Assets.xcassets
      - Chambea/Resources/Localizable.xcstrings
    info:
      path: Chambea/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "Chambea necesita acceso a tus fotos para importar imágenes de portafolio y CV."
        NSPhotoLibraryAddUsageDescription: "Chambea guarda documentos exportados en tu biblioteca cuando lo autorices."
        NSUserNotificationsUsageDescription: "Chambea envía alertas de empleo remoto según tus filtros guardados."
        ITSAppUsesNonExemptEncryption: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.chambea.app
      INFOPLIST_FILE: Chambea/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      SWIFT_EMIT_LOC_STRINGS: YES
      TARGETED_DEVICE_FAMILY: "1"
      ENABLE_PREVIEWS: YES
  ChambeaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ChambeaTests
    dependencies:
      - target: Chambea
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.chambea.app.tests
  ChambeaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ChambeaUITests
    dependencies:
      - target: Chambea
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.chambea.app.uitests
schemes:
  Chambea:
    build:
      targets:
        Chambea: all
    test:
      targets:
        - ChambeaTests
        - ChambeaUITests
    run:
      config: Debug