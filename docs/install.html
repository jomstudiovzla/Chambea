<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563EB">
  <title>Instalar Chambea</title>
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --bg: #F8FAFC;
      --text: #0F172A;
      --muted: #64748B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
      text-align: center;
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      margin-bottom: 20px;
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.35);
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
      max-width: 300px;
      margin-bottom: 40px;
    }
    #installBtn {
      width: 100%;
      max-width: 320px;
      appearance: none;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 1.125rem;
      font-weight: 700;
      padding: 20px 28px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.4);
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #installBtn:active { transform: scale(0.98); opacity: 0.92; }
    #installBtn:disabled { opacity: 0.6; cursor: wait; }
    #status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 320px;
      min-height: 1.4em;
    }
    .hidden-help {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #94A3B8;
    }
    .hidden-help a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">💼</div>
  <h1>Chambea</h1>
  <p class="subtitle">Empleo remoto para hispanohablantes</p>

  <button id="installBtn" type="button">Instalar en tu dispositivo</button>
  <p id="status"></p>

  <p class="hidden-help">
    <a href="#" id="helpLink">¿No funciona?</a>
  </p>

  <script>
    const MANIFEST = 'https://jomstudiovzla.github.io/Chambea/manifest.plist';
    const TESTFLIGHT = '';
    const btn = document.getElementById('installBtn');
    const status = document.getElementById('status');
    const helpLink = document.getElementById('helpLink');

    function install() {
      btn.disabled = true;
      status.textContent = 'Preparando instalación…';

      if (TESTFLIGHT) {
        window.location.href = TESTFLIGHT;
        return;
      }

      const encoded = encodeURIComponent(MANIFEST);
      const ota = 'itms-services://?action=download-manifest&url=' + encoded;

      setTimeout(function () {
        window.location.href = ota;
        status.textContent = 'Si aparece un diálogo, toca Instalar.';
        btn.disabled = false;
      }, 400);
    }

    btn.addEventListener('click', install);

    helpLink.addEventListener('click', function (e) {
      e.preventDefault();
      alert(
        'Si la instalación directa no está disponible aún:\n\n' +
        '1. Necesitas que el IPA esté publicado (cuenta Apple Developer).\n' +
        '2. Mientras tanto, instala desde Mac con Xcode.\n\n' +
        'Contacta al desarrollador para activar la instalación con un toque.'
      );
    });

    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      status.textContent = 'Toca el botón para instalar Chambea.';
    }
  </script>
</body>
</html>
